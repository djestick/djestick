<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&amp;display=swap');
      .title {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-style: italic;
        fill: #F0F0FF;
        font-size: 46px;
      }
      .subtitle {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 700;
        fill: #8D8AA8;
        font-size: 16px;
      }
      .badge-text {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 11px;
        fill: #000000;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Neobrutalist Shadow -->
  <rect x="10" y="10" width="780" height="160" rx="12" fill="#000000" />
  
  <!-- Main Card -->
  <rect x="2" y="2" width="780" height="160" rx="12" fill="#181721" stroke="#000000" stroke-width="4" />
  
  <!-- Top Window Header Line (Retro Dev Theme) -->
  <line x1="2" y1="42" x2="780" y2="42" stroke="#000000" stroke-width="3" />
  
  <!-- Window Controls -->
  <circle cx="30" cy="22" r="7" fill="#FF5F56" stroke="#000000" stroke-width="2.5" />
  <circle cx="50" cy="22" r="7" fill="#FFBD2E" stroke="#000000" stroke-width="2.5" />
  <circle cx="70" cy="22" r="7" fill="#27C93F" stroke="#000000" stroke-width="2.5" />

  <!-- Code Tag Window Title -->
  <rect x="350" y="10" width="100" height="24" rx="4" fill="#0B0B12" stroke="#000000" stroke-width="2" />
  <text x="400" y="26" font-family="monospace" font-size="12" fill="#8F93FF" font-weight="bold" text-anchor="middle">djestick.init</text>

  <!-- Left Accent Strip -->
  <rect x="2" y="42" width="16" height="120" rx="0" fill="#B545FF" stroke="#000000" stroke-width="3" clip-path="inset(0 0 0 0 round 0 0 0 12)" />

  <!-- Content Group -->
  <g transform="translate(45, 60)">
    <!-- Title: Sviatoslav | djestick -->
    <text x="0" y="38" class="title">
      SVIATOSLAV <tspan fill="#C8FF00">|</tspan> DJESTICK
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="70" class="subtitle">
      Creating high-end web applications, graphic designs &amp; unique vibes.
    </text>
  </g>

  <!-- Badges -->
  <!-- Designer Badge -->
  <g transform="translate(560, 110)">
    <rect x="0" y="0" width="100" height="28" rx="6" fill="#8F93FF" stroke="#000000" stroke-width="3" />
    <text x="50" y="18" class="badge-text" text-anchor="middle">DESIGNER</text>
  </g>
  <!-- Developer Badge -->
  <g transform="translate(670, 110)">
    <rect x="0" y="0" width="100" height="28" rx="6" fill="#C8FF00" stroke="#000000" stroke-width="3" />
    <text x="50" y="18" class="badge-text" text-anchor="middle">DEVELOPER</text>
  </g>
</svg>
