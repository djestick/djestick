<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 110" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&amp;display=swap');
      .main-text {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        fill: #000000;
        font-size: 26px;
        letter-spacing: 0.5px;
      }
      .link-text {
        font-family: monospace;
        font-weight: bold;
        fill: #181721;
        font-size: 14px;
        opacity: 0.85;
      }
      .button-card {
        fill: #C8FF00;
        transition: fill 0.2s ease;
      }
    </style>
  </defs>

  <!-- Neobrutalist Shadow -->
  <rect x="10" y="10" width="780" height="90" rx="12" fill="#000000" />
  
  <!-- Main Card -->
  <rect x="2" y="2" width="780" height="90" rx="12" class="button-card" stroke="#000000" stroke-width="4" />
  
  <!-- Accent Line Details (Horizontal strip on the left) -->
  <line x1="2" y1="2" x2="2" y2="92" stroke="#000000" stroke-width="8" />

  <!-- Content Group -->
  <g transform="translate(50, 48)">
    <text x="0" y="0" class="main-text">🌐 EXPLORE MY PORTFOLIO</text>
    <text x="0" y="24" class="link-text">djestick-about-portfolio.web.app</text>
  </g>

  <!-- Retro Click Hand/Cursor Graphic -->
  <g transform="translate(680, 32)">
    <!-- Shadow Cursor -->
    <path d="M12,0 L12,22 L17,17 L24,29 L28,27 L21,15 L28,15 Z" fill="#000000" transform="translate(3, 3)"/>
    <!-- Foreground Cursor -->
    <path d="M12,0 L12,22 L17,17 L24,29 L28,27 L21,15 L28,15 Z" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  </g>
</svg>
