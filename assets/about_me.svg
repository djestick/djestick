<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&amp;display=swap');
      .title {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        fill: #F0F0FF;
        font-size: 24px;
      }
      .label-text {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 11px;
        fill: #000000;
        letter-spacing: 1px;
      }
      .list-text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 600;
        fill: #F0F0FF;
        font-size: 15px;
      }
      .list-muted {
        fill: #8D8AA8;
        font-weight: normal;
      }
      .email-highlight {
        fill: #8F93FF;
        font-weight: 700;
      }
    </style>
  </defs>

  <!-- Neobrutalist Shadow -->
  <rect x="10" y="10" width="780" height="200" rx="12" fill="#000000" />
  
  <!-- Main Card -->
  <rect x="2" y="2" width="780" height="200" rx="12" fill="#181721" stroke="#000000" stroke-width="4" />

  <!-- About Me Title Badge -->
  <g transform="translate(30, 25)">
    <rect x="0" y="0" width="120" height="26" rx="4" fill="#B545FF" stroke="#000000" stroke-width="2.5" />
    <text x="60" y="17" class="label-text" text-anchor="middle">BIOGRAPHY</text>
  </g>

  <!-- Content Group -->
  <g transform="translate(30, 80)">
    <!-- Title -->
    <text x="0" y="0" class="title">Hi, I'm Sviatoslav <tspan fill="#C8FF00">👋</tspan></text>
    
    <!-- List Items -->
    <!-- Item 1 -->
    <g transform="translate(0, 25)">
      <rect x="0" y="2" width="12" height="12" fill="#C8FF00" stroke="#000000" stroke-width="2" />
      <text x="24" y="13" class="list-text">Born on January 31, 2006</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(0, 50)">
      <rect x="0" y="2" width="12" height="12" fill="#8F93FF" stroke="#000000" stroke-width="2" />
      <text x="24" y="13" class="list-text">Graphic Designer <tspan class="list-muted">&amp;</tspan> Figma Enthusiast</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(0, 75)">
      <rect x="0" y="2" width="12" height="12" fill="#B545FF" stroke="#000000" stroke-width="2" />
      <text x="24" y="13" class="list-text">Freelance projects: <tspan fill="#C8FF00" font-weight="bold">Always Open</tspan></text>
    </g>

    <!-- Item 4 -->
    <g transform="translate(0, 100)">
      <rect x="0" y="2" width="12" height="12" fill="#F0F0FF" stroke="#000000" stroke-width="2" />
      <text x="24" y="13" class="list-text">Reach me at: <tspan class="email-highlight">sviatoslav.djestick@gmail.com</tspan></text>
    </g>
  </g>
</svg>
